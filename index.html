<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Jordan's System-Tools Repo</title>
    <style>
        body { background: #0d1117; color: #c9d1d9; font-family: 'Segoe UI', sans-serif; padding: 40px; }
        .container { max-width: 800px; margin: auto; border: 1px solid #30363d; border-radius: 8px; padding: 20px; }
        h1 { color: #58a6ff; border-bottom: 1px solid #30363d; padding-bottom: 10px; }
        .folder-list { list-style: none; padding: 0; }

        .icon { margin-right: 15px; font-size: 20px; }

<body>
    <div class="container">
        <h1>( ͡° ͜ʖ ͡°) Jordan's Apt Repository</h1>
        <p>Official source for <b>System-Tools</b> and bizarre terminal utilities.</p>
        
        <div class="folder-list">
            <a href="./termux/" class="folder-item">
                <span class="icon">📦</span>
                <span>/termux</span>
                <span class="badge">Stable</span>
            </a>
            <a href="./src/" class="folder-item">
                <span class="icon">📂</span>
                <span>/src</span>
                <span class="version">[Hollow Purple Source]</span>
            </a>
            <a href="./lib/" class="folder-item">
