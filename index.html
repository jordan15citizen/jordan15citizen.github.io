<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 3.2 Final//EN">
<html>
<head>
    <title>Index of /</title>
</head>
<body style="font-family: monospace;">
    <h1>Index of /</h1>
    <table id="file-table" style="width: 100%;">
        <thead>
            <tr>
                <th align="left">Type</th>
                <th align="left">Name</th>
                <th align="right">Size (Bytes)</th>
            </tr>
            <tr><th colspan="3"><hr></th></tr>
        </thead>
        <tbody id="file-list">
            <tr><td colspan="3">Loading repository index...</td></tr>
        </tbody>
        <tfoot>
            <tr><th colspan="3"><hr></th></tr>
        </tfoot>
    </table>

    <address id="footer">Jordan's System-Tools Repo / Checking Version...</address>

    <script>
        const repo = "jordan15citizen/jordan15citizen.github.io";
        const fileList = document.getElementById('file-list');

        async function loadRepo() {
            try {
                // 1. Fetch File List from GitHub API
                const response = await fetch(`https://api.github.com/repos/${repo}/contents/`);
                const files = await response.json();
                
                fileList.innerHTML = ''; // Clear loading message

                files.forEach(file => {
                    const isDir = file.type === 'dir';
                    const icon = isDir ? "📂" : "📄";
                    const suffix = isDir ? "/" : "";
                    
                    const row = `
                        <tr>
                            <td>${icon}</td>
                            <td><a href="${file.path}${suffix}">${file.name}${suffix}</a></td>
                            <td align="right">${isDir ? '-' : file.size}</td>
                        </tr>`;
                    fileList.innerHTML += row;
                });

                // 2. Fetch Version from manifest.json
                const manifestRes = await fetch('./manifest.json');
                const manifest = await manifestRes.json();
                document.getElementById('footer').innerHTML = `Jordan's System-Tools Repo / Version ${manifest.version} / 2026-03-21`;

            } catch (err) {
                fileList.innerHTML = '<tr><td colspan="3" style="color:red;">Error loading repo. GitHub API rate limit?</td></tr>';
            }
        }

        loadRepo();
    </script>
</body>
</html>
