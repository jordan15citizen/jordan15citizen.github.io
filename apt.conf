/*
 * [ apt.conf ] - DOMAIN: JORDAN15CITIZEN
 * VERSION: 0.60.0 "SOVEREIGN"
 * PRECISION: KILOBYTES (kB)
 */

// --- SECTION 1: THE BINDING VOW (UNIT PRECISION) ---
// Forces APT to stop rounding to MB and stay in the KB range.
Acquire::Force-Units "kb";
Acquire::http::Dl-Limit "0";

// Custom progress bar: Shows [Percent] [Filename] [Bytes/TotalBytes]
// This makes your 2.3 kB library weight visible during the pull.
APT::Status-Format " [%p] %f %bB/%sB %t";

// --- SECTION 2: REPOSITORY METADATA (SOVEREIGNTY) ---
// This identifies the 'Origin' of the packages as your domain.
APT::FTPArchive::Release::Origin "jordan15citizen";
APT::FTPArchive::Release::Label "jordan15citizen";
APT::FTPArchive::Release::Suite "termux";
APT::FTPArchive::Release::Codename "termux";
APT::FTPArchive::Release::Architectures "all aarch64";
APT::FTPArchive::Release::Components "main";

// --- SECTION 3: ARCHITECTURAL PREFERENCES ---
// Ensures the indexer always stats files for precise size reporting.
APT::FTPArchive::AlwaysStat "true";
APT::FTPArchive::Release::Default-Patterns "true";

// --- SECTION 4: THE "CLEAN" INTERFACE ---
// Disables corporate "Simulation" notes and useless "helpful" text.
Binary::apt::APT::Get::Show-User-Simulation-Note "false";
APT::Get::Show-Upgraded "true";
APT::Get::Assume-Yes "false";

/* * VERDICT: GUILTY OF EXCESSIVE AURA.
 * 💀 🏯 💀 🫸 ⛩️ 🫷
 */
