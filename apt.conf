// Force Kilobyte precision for the Bizarre Domain
Acquire::http::Dl-Limit "0";
Acquire::Force-Units "kb";

// Custom Status string to show raw bytes/kb during the pull
// %b = bytes, %t = total. This makes the 2.3 kB weight visible.
APT::Status-Format " [%p] %f %bB/%sB %t";

// Metadata branding for 0.60.0
APT::FTPArchive::Release::Origin "jordan15citizen";
APT::FTPArchive::Release::Label "jordan15citizen";
APT::FTPArchive::Release::Suite "termux";
APT::FTPArchive::Release::Codename "termux";
APT::FTPArchive::Release::Architectures "all aarch64";
APT::FTPArchive::Release::Components "main";

// Disable the "ChatGPT-AHH" helpful notes
Binary::apt::APT::Get::Show-User-Simulation-Note "false";
